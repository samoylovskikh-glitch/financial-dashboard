<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Calculator 2026</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#16203a; --muted:#6b7693;
    --accent:#2f5cff; --accent2:#7c3aed; --green:#0e9f6e; --amber:#d97706; --red:#dc2626;
    --line:#e6eaf3; --chip:#eef2ff; --radius:16px;
    --shadow:0 4px 24px rgba(22,32,58,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 16px 64px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:12px}
  .logo .ic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700}
  .logo h1{font-size:20px;font-weight:700}
  .logo p{font-size:12.5px;color:var(--muted)}
  .lang{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
  .lang button{border:0;background:transparent;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .lang button.on{background:var(--accent);color:#fff}
  .grid{display:grid;grid-template-columns:380px 1fr;gap:20px}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
  .card h2{font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  select,input[type=number],input[type=text]{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;background:#fff;color:var(--ink);outline:none;transition:border .15s}
  select:focus,input:focus{border-color:var(--accent)}
  .locbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .locbtns button{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s}
  .locbtns button.on{border-color:var(--accent);background:var(--chip);color:var(--accent)}
  .typebtns{display:flex;flex-direction:column;gap:8px}
  .typebtns button{text-align:left;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:14px;cursor:pointer;transition:.15s}
  .typebtns button.on{border-color:var(--accent);background:var(--chip);color:var(--accent);font-weight:600}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bigres{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:560px){.bigres{grid-template-columns:1fr}}
  .res{border-radius:14px;padding:16px;border:1px solid var(--line)}
  .res .t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .res .v{font-size:24px;font-weight:800;letter-spacing:-.5px}
  .res .s{font-size:12px;color:var(--muted);margin-top:4px}
  .res.net{background:#ecfdf5;border-color:#bbe9d4}.res.net .t{color:var(--green)}
  .res.gross{background:#eef2ff;border-color:#cdd8ff}.res.gross .t{color:var(--accent)}
  .res.total{background:#fdf3e7;border-color:#f3ddbe}.res.total .t{color:var(--amber)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;padding:8px 6px;border-bottom:1.5px solid var(--line)}
  th:last-child,td:last-child{text-align:right}
  td{padding:9px 6px;border-bottom:1px solid var(--line)}
  tr.sub td{color:var(--muted);font-size:13px}
  tr.tot td{font-weight:800;border-top:2px solid var(--ink);border-bottom:0}
  .pill{display:inline-block;background:var(--chip);color:var(--accent);font-size:11.5px;font-weight:700;border-radius:20px;padding:3px 10px;margin-left:6px}
  .note{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:14px;background:#f8f9fd;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .warn{font-size:12.5px;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-top:12px;display:none}
  .warn.red{color:#991b1b;background:#fee2e2;border-color:#fecaca;font-weight:600}
  details{margin-top:18px;border:1px solid var(--line);border-radius:12px;background:#fff}
  details summary{cursor:pointer;padding:12px 14px;font-size:13.5px;font-weight:700;color:var(--muted);list-style:none;display:flex;align-items:center;gap:8px}
  details summary::before{content:'⚙';font-size:15px}
  details .inner{padding:4px 14px 16px}
  .rates-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
  .rates-grid label{margin:8px 0 4px;font-size:12px;color:var(--muted)}
  .rates-grid input{padding:8px 10px;font-size:13.5px}
  .fxbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12.5px;color:var(--muted);margin-top:6px}
  .fxbar .fxitem{background:#fff;border:1px solid var(--line);border-radius:8px;padding:4px 8px;display:flex;gap:5px;align-items:center}
  .fxbar input{width:84px;padding:4px 6px;font-size:12.5px;border:1px solid var(--line);border-radius:6px}
  .btn{border:0;background:var(--accent);color:#fff;font-weight:700;font-size:13px;border-radius:9px;padding:8px 14px;cursor:pointer}
  .btn.ghost{background:var(--chip);color:var(--accent)}
  .muted{color:var(--muted)}
  .annual{font-size:12.5px;color:var(--muted)}
  footer{margin-top:26px;font-size:12px;color:var(--muted);line-height:1.6;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="ic">₸</div>
      <div><h1 data-i18n="title">Зарплатный калькулятор 2026</h1><p data-i18n="subtitle">Net → Gross → Total: налоги и полная стоимость найма</p></div>
    </div>
    <div class="lang"><button id="langRu" class="on">RU</button><button id="langEn">EN</button></div>
  </header>

  <div class="grid">
    <!-- ===================== INPUTS ===================== -->
    <div class="card">
      <h2 data-i18n="params">Параметры</h2>

      <label data-i18n="location">Локация</label>
      <div class="locbtns" id="locBtns"></div>

      <label data-i18n="hiretype">Способ найма</label>
      <div class="typebtns" id="typeBtns"></div>

      <label data-i18n="inputmode">Рассчитывать от</label>
      <select id="modeInput">
        <option value="net" data-i18n-opt="modenet">Net — на руки</option>
        <option value="gross" data-i18n-opt="modegross">Gross — официальная зарплата</option>
        <option value="total" data-i18n-opt="modetotal">Total — бюджет компании</option>
      </select>
      <div class="row2">
        <div>
          <label data-i18n="netsalary">Сумма в месяц</label>
          <input type="number" id="netInput" value="2000" min="0" step="50">
        </div>
        <div>
          <label data-i18n="currency">Валюта</label>
          <select id="curInput"><option value="USD">USD $</option><option value="EUR">EUR €</option></select>
        </div>
      </div>

      <div id="cyExtra" style="display:none">
        <label data-i18n="cyexempt">Налоговая льгота (Кипр)</label>
        <select id="cyExempt">
          <option value="none" data-i18n-opt="exnone">Без льготы</option>
          <option value="e20" data-i18n-opt="ex20">20% (макс €8 550) — новый резидент</option>
          <option value="e50" data-i18n-opt="ex50">50% — доход от €55 000/год</option>
        </select>
        <div class="row2">
          <div>
            <label data-i18n="cykids">Дети-иждивенцы (до 18; студенты — до 24)</label>
            <input type="number" id="cyKids" value="0" min="0" max="10" step="1">
          </div>
          <div>
            <label data-i18n="cyhousing">Ипотека/аренда, €/год (макс 2 000)</label>
            <input type="number" id="cyHousing" value="0" min="0" step="100">
          </div>
        </div>
        <div class="row2">
          <div>
            <label data-i18n="cygreen">Энергоэфф./EV, €/год (макс 1 000)</label>
            <input type="number" id="cyGreen" value="0" min="0" step="100">
          </div>
          <div>
            <label data-i18n="cyins">Страхование, €/год (макс 500)</label>
            <input type="number" id="cyIns" value="0" min="0" step="50">
          </div>
        </div>
        <div class="row2">
          <div>
            <label data-i18n="cyspouse">Доход супруга(и) gross, €/год</label>
            <input type="number" id="cySpouse" value="0" min="0" step="1000">
          </div>
          <div>
            <label data-i18n="cysingle">Одинокий родитель</label>
            <select id="cySingle">
              <option value="no" data-i18n-opt="optno">Нет</option>
              <option value="yes" data-i18n-opt="optyes">Да (вычет на детей ×2)</option>
            </select>
          </div>
        </div>
      </div>
      <div id="amExtra" style="display:none">
        <label data-i18n="amregime">Налоговый режим (Армения)</label>
        <select id="amRegime">
          <option value="standard" data-i18n-opt="amstd">Налог с оборота 10% (услуги)</option>
          <option value="hitech" data-i18n-opt="amht">Hi-Tech сертификат — 1%</option>
        </select>
      </div>

      <details>
        <summary data-i18n="fxs">Курсы валют</summary>
        <div class="inner">
          <div class="fxbar" id="fxBar"></div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="btn" id="fxRefresh" data-i18n="fxupd">Обновить с API</button>
            <button class="btn ghost" id="fxReset" data-i18n="fxreset">Сбросить правки</button>
          </div>
          <div class="note" id="fxStatus"></div>
        </div>
      </details>

      <details>
        <summary data-i18n="ratesedit">Налоговые ставки (редактируемые)</summary>
        <div class="inner"><div class="rates-grid" id="ratesGrid"></div></div>
      </details>
    </div>

    <!-- ===================== RESULTS ===================== -->
    <div class="card">
      <h2 data-i18n="result">Результат <span class="pill" id="resPill"></span></h2>
      <div class="bigres">
        <div class="res net"><div class="t">Net</div><div class="v" id="rNet">—</div><div class="s" data-i18n="netdesc">на руки / в месяц</div><div class="annual" id="rNetY"></div></div>
        <div class="res gross"><div class="t">Gross</div><div class="v" id="rGross">—</div><div class="s" data-i18n="grossdesc">официальная зарплата</div><div class="annual" id="rGrossY"></div></div>
        <div class="res total"><div class="t">Total</div><div class="v" id="rTotal">—</div><div class="s" data-i18n="totaldesc">стоимость для компании</div><div class="annual" id="rTotalY"></div></div>
      </div>

      <table id="taxTable">
        <thead><tr><th data-i18n="thtax">Налог / взнос</th><th data-i18n="thrate">Ставка</th><th data-i18n="thmonth">В месяц</th></tr></thead>
        <tbody id="taxBody"></tbody>
      </table>

      <div class="warn" id="warnBox"></div>
      <div class="note" id="noteBox"></div>
    </div>
  </div>

  <footer id="footNote"></footer>
</div>

const FX_KEYS = ['EUR','RUB','BYN','AMD','GEL'];

  JSON.parse(localStorage.getItem('sc_fx')||'{}'));
let fxOverrides = JSON.parse(localStorage.getItem('sc_fx_over')||'{}');

async function fetchFx(){
  try{
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const j = await r.json();
    if(j && j.rates){
      FX_KEYS.forEach(k => { if(j.rates[k]) fx[k] = j.rates[k]; });
      localStorage.setItem('sc_fx', JSON.stringify(fx));
      fxLoaded = true;
    }
  }catch(e){ fxLoaded = false; }
  renderFx(); calc();

function rate(k){ return fxOverrides[k]!==undefined ? fxOverrides[k] : fx[k]; } // per 1 USD
// convert amount between currencies (USD-pivot)
function conv(amount, from, to){
  if(from===to) return amount;
  const usd = from==='USD' ? amount : amount / rate(from);
  return to==='USD' ? usd : usd * rate(to);
}

/* ============================================================
   TAX ENGINES — each takes annual GROSS/turnover in LOCAL currency,
   returns {net, total, items:[{key,rate,amount,side}]} (annual, local)
============================================================ */
function pct(x){ return x/100; }

function cyprusPIT(taxable){
  const br = [[22000,0],[32000,.20],[42000,.25],[72000,.30],[Infinity,.35]];
  let tax=0, prev=0;
  for(const [up,r] of br){ if(taxable>prev) tax += (Math.min(taxable,up)-prev)*r; prev=up; if(taxable<=up) break; }
  return tax;
}
function cyDeductions2026(G){
  // Налоговая реформа Кипра 2026: вычеты на детей, жильё, энергоэффективность, страхование.
  // Порог применяется к ВАЛОВОМУ ДОХОДУ СЕМЬИ (оба супруга): 0–2 детей — 100k, 3–4 — 150k, 5+ — 200k.
  // При соблюдении порога вычет на детей получает каждый супруг; одинокий родитель — в двойном размере.
  const kids = Math.max(0, parseInt(document.getElementById('cyKids').value)||0);
  const spouse = Math.max(0, parseFloat(document.getElementById('cySpouse').value)||0);
  const single = document.getElementById('cySingle').value==='yes';
  const familyIncome = G + spouse;
  const cap = kids>=5 ? 200000 : (kids>=3 ? 150000 : 100000);
  if(familyIncome > cap) return {sum:0, cut:true, any: kids>0 || (parseFloat(document.getElementById('cyHousing').value)||0)>0 || (parseFloat(document.getElementById('cyGreen').value)||0)>0 || (parseFloat(document.getElementById('cyIns').value)||0)>0};
  let kidsDed = 0;
  for(let i=1;i<=kids;i++) kidsDed += i===1 ? 1000 : (i===2 ? 1250 : 1500);
  if(single) kidsDed *= 2;
  const housing = Math.min(2000, Math.max(0, parseFloat(document.getElementById('cyHousing').value)||0));
  const green = Math.min(1000, Math.max(0, parseFloat(document.getElementById('cyGreen').value)||0));
  const ins = Math.min(500, Math.max(0, parseFloat(document.getElementById('cyIns').value)||0));
  return {sum: kidsDed + housing + green + ins, cut:false, any:false};
}
function engine_cy(G){
  const siBase = Math.min(G, P.cy_si_cap);
  const si = siBase*pct(P.cy_si_emp);
  const gesy = Math.min(G,180000)*pct(P.cy_gesy_emp);
  let exemption = 0;
  const ex = document.getElementById('cyExempt').value;
  if(ex==='e20') exemption = Math.min(G*0.20, 8550);
  if(ex==='e50' && G>55000) exemption = G*0.50;
  const ded = cyDeductions2026(G);
  // Правило 1/5: совокупные вычеты из базы (соцстрах + GESY + вычеты ст.14/14B)
  // не могут превышать 1/5 ЧИСТОГО СОВОКУПНОГО ДОХОДА — т.е. дохода ПОСЛЕ льготы 20%/50%.
  const dedCap = Math.max(0, G - exemption)/5;
  const dedTotal = Math.min(si + gesy + ded.sum, dedCap);
  const dedCapped = (si + gesy + ded.sum) > dedCap;
  const taxable = Math.max(0, G - exemption - dedTotal);
  const pit = cyprusPIT(taxable);
  const erSi = siBase*pct(P.cy_si_er);
  const erCo = G*pct(P.cy_cohesion);
  const erGesy = Math.min(G,180000)*pct(P.cy_gesy_er);
  return {
    net: G - si - gesy - pit,
    total: G + erSi + erCo + erGesy,
    dedCut: ded.cut && ded.any,
    dedSum: ded.sum,
    dedCapped: dedCapped,
    dedApplied: dedTotal,
    items:[
      {key:'pit', rate:'0–35%', amount:pit, side:'e'},
      {key:'sife', rate:P.cy_si_emp+'%', amount:si, side:'e'},
      {key:'gesye', rate:P.cy_gesy_emp+'%', amount:gesy, side:'e'},
      {key:'sifr', rate:P.cy_si_er+'%', amount:erSi, side:'r'},
      {key:'cohesion', rate:P.cy_cohesion+'%', amount:erCo, side:'r'},
      {key:'gesyr', rate:P.cy_gesy_er+'%', amount:erGesy, side:'r'}
    ]
  };
}
function engine_by_employment(G){
  const avg = P.by_avg*12; // annual average salary base (HTP benefit: employer SI from avg salary)
  const fszn1 = Math.min(G,avg)*pct(P.by_fszn_emp);
  const pit = G*pct(P.by_pit);
  const erFszn = Math.min(G,avg)*pct(P.by_fszn_er);
  const bgs = G*pct(P.by_bgs);
  return {
    net: G - pit - fszn1,
    total: G + erFszn + bgs,
    items:[
      {key:'pit', rate:P.by_pit+'%', amount:pit, side:'e'},
      {key:'fszn1', rate:P.by_fszn_emp+'%', amount:fszn1, side:'e'},
      {key:'fszn34', rate:P.by_fszn_er+'%', amount:erFszn, side:'r'},
      {key:'bgs', rate:P.by_bgs+'%', amount:bgs, side:'r'}
    ]
  };
}
function engine_by_civil(G){
  const fszn1 = G*pct(P.by_fszn_emp);
  const pit = G*pct(P.by_pit);
  const erFszn = G*pct(P.by_fszn_er);
  const bgs = G*pct(P.by_bgs);
  return {
    net: G - pit - fszn1,
    total: G + erFszn + bgs,
    items:[
      {key:'pit', rate:P.by_pit+'%', amount:pit, side:'e'},
      {key:'fszn1', rate:P.by_fszn_emp+'%', amount:fszn1, side:'e'},
      {key:'fszn34', rate:P.by_fszn_er+'%', amount:erFszn, side:'r'},
      {key:'bgs', rate:P.by_bgs+'%', amount:bgs, side:'r'}
    ]
  };
}
function engine_by_ie(T){
  const tax = T*pct(P.by_ie_eff);
  const fszn = P.by_ie_fszn;
  return {
    net: T - tax - fszn, total: T,
    items:[
      {key:'ipTax', rate:P.by_ie_eff+'%', amount:tax, side:'e'},
      {key:'ipFszn', rate:'fix', amount:fszn, side:'e'}
    ]
  };
}
function engine_ru_ie(T){
  const usn = T*pct(P.ru_usn);
  const extra = Math.min(P.ru_extra_cap, Math.max(0,(T-300000))*0.01);
  const contrib = P.ru_fix + extra;
  // УСН 6% уменьшается на взносы (ИП без работников) — платится max(УСН, взносы)
  const tax = Math.max(usn, contrib);
  const items = usn >= contrib
    ? [{key:'usn', rate:P.ru_usn+'%', amount:usn, side:'e'},
       {key:'fixed', rate:'→0', amount:0, side:'e'}]
    : [{key:'usn', rate:'→0', amount:0, side:'e'},
       {key:'fixed', rate:'fix+1%', amount:contrib, side:'e'}];
  return { net: T - tax, total: T, items };
}
function engine_ru_selfemp(T){
  const tax = T*pct(P.ru_npd);
  return { net: T - tax, total: T,
    items:[{key:'npd', rate:P.ru_npd+'%', amount:tax, side:'e'}] };
}
function engine_am(T){
  const regime = document.getElementById('amRegime').value;
  const tr = regime==='hitech' ? P.am_hitech : P.am_turnover;
  const turnover = T*pct(tr);
  const social = T<=6000000 ? T*pct(P.am_social) : Math.max(0, T*0.10 - 300000);
  const stamp = T<=12000000 ? P.am_stamp_lo : P.am_stamp_hi;
  const health = T>2400000 ? P.am_health : 0;
  return { net: T - turnover - social - stamp - health, total: T,
    items:[
      {key:'turnover', rate:tr+'%', amount:turnover, side:'e'},
      {key:'social', rate:T<=6000000?P.am_social+'%':'10%−300k', amount:social, side:'e'},
      {key:'stamp', rate:'fix', amount:stamp, side:'e'},
      {key:'health', rate:'fix', amount:health, side:'e'}
    ]
  };
}
function engine_ge(T){
  const lim = P.ge_limit;
  const tax = Math.min(T,lim)*pct(P.ge_sbs) + Math.max(0,T-lim)*pct(P.ge_sbs_hi);
  return { net: T - tax, total: T,
    items:[{key:'sbs', rate: T>lim ? P.ge_sbs+'% / '+P.ge_sbs_hi+'%' : P.ge_sbs+'%', amount:tax, side:'e'}] };
}
function getEngine(){
  const k = state.loc + '_' + state.type;
  if(state.loc==='cy') return engine_cy;
  if(k==='by_employment') return engine_by_employment;
  if(k==='by_civil') return engine_by_civil;
  if(k==='by_ie') return engine_by_ie;
  if(k==='ru_ie') return engine_ru_ie;
  if(k==='ru_selfemp') return engine_ru_selfemp;
  if(state.loc==='am') return engine_am;
  if(state.loc==='ge') return engine_ge;
  return engine_ge;
}

/* ============================================================
   NET → GROSS solver (bisection on annual local gross/turnover)
============================================================ */
function solveGross(netAnnualLocal, engine){
  let lo = netAnnualLocal, hi = netAnnualLocal*4 + 1e6;
  // ensure hi is high enough
  for(let i=0;i<60;i++){
    if(engine(hi).net >= netAnnualLocal) break;
    hi *= 2;
  }
  for(let i=0;i<200;i++){
    const mid = (lo+hi)/2;
    if(engine(mid).net < netAnnualLocal) lo = mid; else hi = mid;
  }
  return (lo+hi)/2;
}
// TOTAL → GROSS: подбор gross, при котором полная стоимость для компании равна бюджету
function solveGrossFromTotal(totalAnnualLocal, engine){
  let lo = 0, hi = totalAnnualLocal + 1e6;
  for(let i=0;i<60;i++){
    if(engine(hi).total >= totalAnnualLocal) break;
    hi *= 2;
  }
  for(let i=0;i<200;i++){
    const mid = (lo+hi)/2;
    if(engine(mid).total < totalAnnualLocal) lo = mid; else hi = mid;
  }
  return (lo+hi)/2;
}

/* ============================================================
   MAIN CALC
============================================================ */
function calc(){
  const inputMonthly = parseFloat($$('netInput').value)||0;
  const mode = $$('modeInput').value; // net | gross | total
  const cur = $$('curInput').value; // USD|EUR
  const local = LOCATIONS[state.loc].local;
  const engine = getEngine();

  const inputAnnualLocal = conv(inputMonthly*12, cur, local);
  let G;
  if(mode==='gross')      G = inputAnnualLocal;
  else if(mode==='total') G = solveGrossFromTotal(inputAnnualLocal, engine);
  else                    G = solveGross(inputAnnualLocal, engine);
  const res = engine(G);

  const netAnnualLocal = res.net;
  const totalM = conv(res.total, local, cur)/12;
  const netM = conv(res.net, local, cur)/12;

  $$('rNet').textContent = fmt(netM, cur);
  $$('rGross').textContent = fmt(conv(G,local,cur)/12, cur);
  $$('rTotal').textContent = fmt(totalM, cur);
  $$('rNetY').textContent = fmt(netM*12,cur)+' '+t('peryear');
  $$('rGrossY').textContent = fmt(conv(G,local,cur)/12*12,cur)+' '+t('peryear');
  $$('rTotalY').textContent = fmt(totalM*12,cur)+' '+t('peryear');
  const pill = $$('resPill'); if(pill) pill.textContent = t('locs')[state.loc]+' · '+t('types')[state.type];

  // tax table
  const tn = t('taxNames');
  const empItems = res.items.filter(i=>i.side==='e' && i.amount>0.005);
  const erItems = res.items.filter(i=>i.side==='r' && i.amount>0.005);
  let html = '';
  const rowsFor = items => items.map(i=>{
    const m = conv(i.amount,local,cur)/12;
    const mLoc = i.amount/12;
    return `<tr class="sub"><td>${tn[i.key]||i.key}</td><td>${i.rate}</td><td>${fmt2(m,cur)} <span class="muted" style="font-size:11.5px">(${fmt2(mLoc,local)})</span></td></tr>`;
  }).join('');
  const sum = items => items.reduce((a,i)=>a+i.amount,0);
  if(empItems.length){
    html += `<tr><td colspan="2" style="font-weight:700">${t('empTaxes')}</td><td style="font-weight:700">${fmt2(conv(sum(empItems),local,cur)/12,cur)}</td></tr>` + rowsFor(empItems);
  }
  if(erItems.length){
    html += `<tr><td colspan="2" style="font-weight:700">${t('erTaxes')}</td><td style="font-weight:700">${fmt2(conv(sum(erItems),local,cur)/12,cur)}</td></tr>` + rowsFor(erItems);
  }
  const allTax = sum(res.items);
  const burden = res.total>0 ? allTax/res.total*100 : 0;
  html += `<tr class="tot"><td colspan="2">${t('totTaxes')} <span class="muted" style="font-weight:400">· ${t('burden')}: ${burden.toFixed(1)}%</span></td><td>${fmt2(conv(allTax,local,cur)/12,cur)}</td></tr>`;
  $$('taxBody').innerHTML = html;

  // warnings (red = режим неприменим, жёлтое = информация)
  const warn = $$('warnBox'); warn.style.display='none'; warn.textContent=''; warn.classList.remove('red');
  if(state.loc==='cy' && res.dedCut){
    warn.textContent = t('cyDedCut'); warn.style.display='block';
  }
  if(state.loc==='cy' && res.dedCapped){
    warn.textContent = (warn.textContent?warn.textContent+' ':'') + t('cyDedCapped'); warn.style.display='block';
  }
  if(state.loc==='ru' && state.type==='selfemp' && G > P.ru_npd_limit){
    warn.textContent = t('warnNPD'); warn.style.display='block'; warn.classList.add('red');
  }
  if(state.loc==='am' && G > 115000000){
    warn.textContent = t('warnAM'); warn.style.display='block'; warn.classList.add('red');
  }
  if(state.loc==='ge' && G > P.ge_limit){
    warn.textContent = t('warnGE'); warn.style.display='block';
  }

  // note: local-currency summary
  let noteHtml = `Net: <b>${fmt2(netAnnualLocal/12,local)}</b> · Gross: <b>${fmt2(G/12,local)}</b> · Total: <b>${fmt2(res.total/12,local)}</b> / ${lang==='ru'?'мес':'mo'} (${t('inLocal')}, ${local})`;
  if(state.loc==='cy' && res.dedSum>0){
    noteHtml += `<br>${lang==='ru'?'Применены вычеты 2026':'2026 deductions applied'}: <b>−€${res.dedSum.toLocaleString()}</b> ${lang==='ru'?'из налогооблагаемой базы / год':'from taxable income / yr'}`;
  }
  $$('noteBox').innerHTML = noteHtml;
}
